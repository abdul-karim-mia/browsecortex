<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Click Test Page</title>
  </head>
  <body>
    <h1>Click counter</h1>
    <button id="btn" onclick="document.getElementById('count').textContent = Number(document.getElementById('count').textContent) + 1">
      Increment
    </button>
    <span id="count">0</span>
  </body>
</html>
