name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Coverage (extension)
        run: npm run test:coverage --workspace @browsecortex/extension
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/lcov.info
          if-no-files-found: ignore
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit
      - name: Build extension
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: packages/extension
      - name: Run integration tests
        run: xvfb-run -a npm run e2e
        working-directory: packages/extension
